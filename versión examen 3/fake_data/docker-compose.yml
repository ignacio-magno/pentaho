services:
  seeder:
    build: .
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-Admin007}
      DB_NAME: ${DB_NAME:-inacap_2}
      ITEM_COUNT: ${ITEM_COUNT:-120}
      SEED_TARGET: ${SEED_TARGET:-inventario}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"
